<!DOCTYPE html>
<html class="scroll-smooth" lang="ru">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Блог и Новости | Pago Fácil</title>
    <meta name="description" content="Экспертные статьи о криптоплатежах, легализации и будущем цифровых финансов в Испании от Pago Fácil."/>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
        .nav-dropdown { display: none; }
        .nav-item-dropdown:hover .nav-dropdown { display: block; }
    </style>
</head>
<body class="text-slate-900">

    <!-- Navigation -->
    <div id="nav-wrapper"></div>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 bg-white border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <span class="inline-block bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-wider mb-6">📰 Наш блог</span>
            <h1 class="text-5xl md:text-6xl font-extrabold text-slate-900 mb-6 tracking-tight">Экспертный контент</h1>
            <p class="text-xl text-slate-500 max-w-2xl mx-auto leading-relaxed">Статьи о криптоплатежах, легализации и цифровых финансах в Испании.</p>
        </div>
    </section>

    <!-- Blog Grid -->
    <main class="max-w-7xl mx-auto px-6 py-20">
        <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Посты появятся здесь автоматически -->
            <div class="col-span-full text-center py-20 text-slate-400">
                <span class="material-symbols-outlined text-5xl mb-4 block">newspaper</span>
                <p class="font-medium">Загрузка публикаций...</p>
            </div>
        </div>
    </main>

    <!-- CTA Section -->
    <section class="pb-20 px-4">
        <div class="max-w-5xl mx-auto bg-emerald-600 rounded-[3rem] p-12 text-center text-white shadow-2xl shadow-emerald-200">
            <h2 class="text-3xl md:text-4xl font-bold mb-4">Оставайтесь в курсе событий</h2>
            <p class="text-emerald-100 mb-10 text-lg">Подпишитесь на наш Telegram-канал, чтобы первыми получать обновления.</p>
            <a href="https://t.me/pagofasil" class="inline-block bg-white text-emerald-600 font-bold px-10 py-4 rounded-2xl hover:bg-emerald-50 transition-all shadow-lg hover:scale-105">
                Подписаться на Telegram →
            </a>
        </div>
    </section>

    <!-- ВАЖНО: Путь к shared.js должен быть корректным -->
    <script src="shared.js"></script>
    <script src="posts_db.js"></script>
    <script>
        function renderPosts() {
            const container = document.getElementById('posts-container');
            if (!container) return;

            const posts = window.BLOG_POSTS;
            if (!posts || posts.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center py-20 text-slate-400 font-medium">Публикаций пока нет. Создайте первый пост через Pago Hub!</p>';
                return;
            }

            // Сортируем новые посты наверх
            const sorted = [...posts].reverse();

            container.innerHTML = sorted.map(post => `
                <article class="group bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 hover:shadow-2xl transition-all duration-300 hover:-translate-y-2">
                    <div class="h-64 overflow-hidden relative bg-slate-100">
                        ${post.image
                            ? `<img src="${post.image}" alt="${post.title}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" onerror="this.style.display='none'">`
                            : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-emerald-50 to-teal-100"><span class="material-symbols-outlined text-6xl text-emerald-300">article</span></div>`
                        }
                        <div class="absolute top-6 left-6">
                            <span class="bg-emerald-500 text-white px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider shadow-lg">
                                ${post.category || 'Блог'}
                            </span>
                        </div>
                    </div>
                    <div class="p-8">
                        <p class="flex items-center gap-2 text-slate-400 text-xs font-medium mb-4">
                            <span class="material-symbols-outlined text-sm">calendar_today</span> ${post.date}
                        </p>
                        <h2 class="text-xl font-bold text-slate-900 mb-5 group-hover:text-emerald-600 transition-colors leading-tight line-clamp-2">
                            <a href="${post.link}">${post.title}</a>
                        </h2>
                        <a href="${post.link}" class="inline-flex items-center gap-2 text-emerald-600 font-bold text-sm hover:gap-3 transition-all uppercase tracking-wide">
                            Читать <span class="material-symbols-outlined text-lg">arrow_right_alt</span>
                        </a>
                    </div>
                </article>
            `).join('');
        }

        // Пробуем загрузить посты, добавленные через Make.com
        window.addEventListener('load', renderPosts);
    </script>
</body>
</html>
